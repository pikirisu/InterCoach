$kind: http-request
name: Healthcheck
method: GET
url: "{{baseUrl}}/api/v1/health"
order: 500
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      const health = json.data || {};

      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response uses API envelope", function () {
        pm.expect(json).to.include({ success: true, statusCode: 200 });
        pm.expect(json.message).to.equal("Healthcheck passed");
      });

      pm.test("Health payload has server and database status", function () {
        pm.expect(health.status).to.equal("ok");
        pm.expect(health).to.have.property("uptime");
        pm.expect(health).to.have.property("timestamp");
        pm.expect(health.database).to.have.property("readyState");
        pm.expect(health.database).to.have.property("status");
      });
