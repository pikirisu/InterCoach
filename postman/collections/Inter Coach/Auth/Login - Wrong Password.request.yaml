$kind: http-request
name: "Login - Wrong Password"
method: POST
url: "{{baseUrl}}/api/v1/auth/login"
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "testuser@example.com",
      "password": "WrongPassword"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test("Status is 401 Unauthorized", function () {
        pm.response.to.have.status(401);
      });

      pm.test("Response uses error envelope", function () {
        pm.expect(json).to.include({ success: false, statusCode: 401 });
        pm.expect(json.message.toLowerCase()).to.include("invalid credentials");
        pm.expect(json).to.not.have.property("data");
      });
