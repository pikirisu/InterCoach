$kind: http-request
name: Get Analysis By ID
method: GET
url: "{{baseUrl}}/api/v1/analysis/{{analysisId}}"
order: 2000
headers:
  - key: Authorization
    value: "Bearer {{authToken}}"
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      const analysis = json.data && json.data.analysis;

      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response uses API envelope", function () {
        pm.expect(json).to.include({ success: true, statusCode: 200 });
        pm.expect(json).to.have.property("data");
      });

      pm.test("Response has analysis object", function () {
        pm.expect(analysis).to.be.an("object");
        pm.expect(analysis).to.have.property("analysisId");
        pm.expect(analysis).to.have.property("resumeId");
        pm.expect(analysis).to.have.property("overallScore");
      });

      pm.test("Analysis ID matches requested ID", function () {
        const requestedId = pm.environment.get("analysisId");
        if (requestedId) {
          pm.expect(analysis.analysisId).to.equal(requestedId);
        }
      });
