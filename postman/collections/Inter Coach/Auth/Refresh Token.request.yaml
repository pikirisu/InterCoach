$kind: http-request
name: Refresh Token
method: POST
url: "{{baseUrl}}/api/v1/auth/refresh-token"
order: 2100
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "refreshToken": "{{refreshToken}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      const data = json.data || {};

      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response uses API envelope", function () {
        pm.expect(json).to.include({ success: true, statusCode: 200 });
        pm.expect(json).to.have.property("message", "Access token refreshed successfully");
        pm.expect(json).to.have.property("data");
      });

      pm.test("Response rotates token pair", function () {
        pm.expect(data.accessToken).to.be.a("string").and.not.empty;
        pm.expect(data.refreshToken).to.be.a("string").and.not.empty;
      });

      if (data.accessToken) {
        pm.environment.set("authToken", data.accessToken);
      }

      if (data.refreshToken) {
        pm.environment.set("refreshToken", data.refreshToken);
      }
